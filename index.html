<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🚢 Cuenta atrás para el Crucero</title>

    <meta name="theme-color" content="#0d8de6">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Fondo -->

    <div class="background">

        <div class="sun"></div>

        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>

        <div class="bubble bubble1"></div>
        <div class="bubble bubble2"></div>
        <div class="bubble bubble3"></div>
        <div class="bubble bubble4"></div>
        <div class="bubble bubble5"></div>

        <div class="wave wave-back"></div>
        <div class="wave wave-front"></div>

    </div>

    <!-- Contenido -->

    <main class="container">

        <section class="hero">

            <div class="ship-container">

                <div class="ship">
                    🚢
                </div>

            </div>

            <h1>
                ¡Nos vamos de Crucero!
            </h1>

            <p class="subtitle">
                Mediterráneo · Verano 2026
            </p>

        </section>

        <section class="countdown">

            <div class="time-card">

                <span id="days" class="number">0</span>

                <span class="label">
                    Días
                </span>

            </div>

            <div class="time-card">

                <span id="hours" class="number">0</span>

                <span class="label">
                    Horas
                </span>

            </div>

            <div class="time-card">

                <span id="minutes" class="number">0</span>

                <span class="label">
                    Minutos
                </span>

            </div>

            <div class="time-card">

                <span id="seconds" class="number">0</span>

                <span class="label">
                    Segundos
                </span>

            </div>

        </section>

        <section class="status">

            <p id="message">
                ⚓ Preparando las maletas...
            </p>

        </section>

        <section class="trip-info">

            <div class="glass">

                <h2>📅 Salida</h2>

                <p>19 de Julio de 2026</p>

            </div>

            <div class="glass">

                <h2>🌴 Destino</h2>

                <p>Mediterráneo</p>

            </div>

        </section>

    </main>


    <script src="script.js"></script>

</body>

</html>
